<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التحقق من الإيداعات</title>
</head>
<body>
    <div style="max-width: 500px; margin: 50px auto; font-family: sans-serif;">
        <h2>طلب إيداع جديد</h2>
        <button onclick="alert('تم إنشاء الطلب بنجاح!')">طلب إيداع</button>

        <h2 style="margin-top: 40px;">رفع إيصال التحويل</h2>
        <form onsubmit="event.preventDefault(); alert('تم رفع الإيصال بنجاح!');">
            <input type="file" required>
            <button type="submit">رفع الإيصال</button>
        </form>
    </div>
</body>
</html>
<script>
document.querySelector("button").addEventListener("click", function() {
    fetch('/api/deposit', {
        method: 'POST'
    }).then(response => response.text())
      .then(data => alert(data))
      .catch(error => console.error('Error:', error));
});

document.querySelector("form").addEventListener("submit", function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    fetch('/api/receipt/upload', {
        method: 'POST',
        body: formData
    }).then(response => response.text())
      .then(data => alert(data))
      .catch(error => console.error('Error:', error));
});
</script>
